<!-- Blog Post Detail Page -->
<div class="min-h-screen bg-black pt-[90px]" *ngIf="post">
  <section class="bg-gradient-to-b from-black to-[#121414] pt-10 pb-4 px-8 md:px-16 lg:px-24">
    <div class="max-w-3xl mx-auto">
      <button
        type="button"
        (click)="backToList()"
        class="blog-btn bg-gold text-white px-5 py-2 text-sm font-sans rounded-md shadow-lg mb-8">
        {{ translations?.blog?.backToList || 'Back to Blog' }}
      </button>
      <h1 class="text-white font-sans text-4xl md:text-5xl font-bold mb-6">{{ post.title }}</h1>
      <p class="text-gray-400 font-sans text-sm mb-8" *ngIf="post.date">{{ post.date }}</p>
    </div>
  </section>

  <section class="pb-20 px-8 md:px-16 lg:px-24" style="background: linear-gradient(180deg, #121414 0%, #000000 100%);">
    <div class="max-w-3xl mx-auto">
      <div class="blog-post-content">
        <img
          *ngIf="post.image"
          [src]="post.image"
          [alt]="post.title"
          class="w-full rounded-lg mb-10 object-cover max-h-[360px]"
          loading="lazy" width="600" height="400" />
        <div class="text-gray-300 font-sans text-lg leading-relaxed whitespace-pre-line">{{ post.body }}</div>
      </div>
    </div>
  </section>
</div>

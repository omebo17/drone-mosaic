# Build Angular and update docs/ so GitHub Pages (Deploy from branch → docs) serves the latest build.
# Keep Settings → Pages → Source = "Deploy from a branch" and folder = "docs".
name: pages-build-deployment

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --configuration production

      - name: Add 404 for SPA routing
        run: cp 404.html dist/photon/404.html

      - name: Update docs folder
        run: |
          rm -rf docs/*
          cp -r dist/photon/* docs/

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update docs for GitHub Pages [skip ci]"
          git push

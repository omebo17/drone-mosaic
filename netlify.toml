# Netlify config for Angular SPA
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm ci && npm run build"
  publish = "dist/photon"

# SPA: serve index.html for all routes so Angular router works (no 404 on /en, /ka, /ka/booking, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
